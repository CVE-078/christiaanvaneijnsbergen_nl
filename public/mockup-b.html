<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPL Tracker — Design B Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0a;
    --surface:  #141414;
    --border:   #1f1f1f;
    --muted:    #3a3a3a;
    --dim:      #666;
    --body:     #d4d4d4;
    --heading:  #ffffff;
    --lime:     #e8ff47;
    --mono:     'JetBrains Mono', 'Courier New', monospace;
    --sans:     'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--body);
    font-family: var(--sans);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ───────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.8125rem;
    letter-spacing: 0.08em;
    color: var(--heading);
    text-transform: uppercase;
  }

  .week-label {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .week-label strong {
    color: var(--lime);
    font-weight: 700;
  }

  nav {
    margin-left: auto;
    display: flex;
    gap: 1.25rem;
  }

  nav a {
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.02em;
    cursor: pointer;
  }

  nav a.active {
    color: var(--heading);
    border-bottom: 1px solid var(--lime);
    padding-bottom: 1px;
  }

  /* ── Workout selector ─────────────────────────── */
  .workout-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .workout-tab {
    flex: 1;
    padding: 0.875rem 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.6875rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .workout-tab.active {
    color: var(--heading);
    border-bottom-color: var(--lime);
  }

  /* ── Context bar ──────────────────────────────── */
  .context-bar {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 1rem 1rem 0.5rem;
  }

  .context-bar .phase {
    font-family: var(--mono);
    font-size: 0.6875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .context-bar .rir-badge {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--lime);
    letter-spacing: 0.04em;
  }

  .context-bar .desc {
    font-size: 0.8125rem;
    color: var(--dim);
    margin-left: auto;
  }

  /* ── Exercise list ────────────────────────────── */
  .exercises {
    padding: 0.5rem 1rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .exercise {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .exercise-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.875rem 1rem;
    cursor: pointer;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
  }

  .ex-number {
    font-family: var(--mono);
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--muted);
    line-height: 1;
    width: 2.25rem;
    flex-shrink: 0;
    letter-spacing: -0.04em;
    user-select: none;
  }

  .ex-info {
    flex: 1;
    min-width: 0;
  }

  .ex-name {
    font-weight: 600;
    font-size: 0.9375rem;
    color: var(--heading);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ex-meta {
    font-family: var(--mono);
    font-size: 0.625rem;
    letter-spacing: 0.06em;
    color: var(--dim);
    margin-top: 0.25rem;
    text-transform: uppercase;
  }

  .ex-progress {
    font-family: var(--mono);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    color: var(--muted);
  }

  .ex-progress .filled-char { color: var(--lime); }

  /* ── Set rows ─────────────────────────────────── */
  .sets {
    border-top: 1px solid var(--border);
    padding: 0.25rem 1rem 0.875rem;
  }

  .set-note {
    font-size: 0.75rem;
    color: var(--dim);
    padding: 0.625rem 0 0.375rem;
    line-height: 1.5;
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
  }

  .set-row:last-child { border-bottom: none; }

  .set-num {
    font-family: var(--mono);
    font-size: 0.6875rem;
    color: var(--muted);
    width: 1.5rem;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  .set-input {
    width: 3.75rem;
    padding: 0.4rem 0.5rem;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--heading);
    font-family: var(--mono);
    font-size: 0.8125rem;
    text-align: center;
    outline: none;
    transition: border-color 0.1s;
  }

  .set-input:focus { border-color: var(--lime); }
  .set-input::placeholder { color: var(--muted); }

  .set-sep {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 0.75rem;
  }

  .set-rir {
    font-family: var(--mono);
    font-size: 0.6875rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    margin-left: auto;
  }

  .set-save {
    padding: 0.375rem 0.875rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--body);
    font-family: var(--mono);
    font-size: 0.6875rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.1s, color 0.1s;
    flex-shrink: 0;
  }

  .set-save:hover { border-color: var(--lime); color: var(--lime); }

  /* Saved state */
  .set-row.is-saved { opacity: 0.5; }

  .set-row.is-saved .set-summary {
    font-family: var(--mono);
    font-size: 0.8125rem;
    color: var(--body);
    letter-spacing: 0.02em;
  }

  .set-check {
    font-size: 0.75rem;
    color: var(--lime);
    margin-left: auto;
    font-family: var(--mono);
  }

  .set-actions {
    display: flex;
    gap: 0.5rem;
    margin-left: auto;
    align-items: center;
  }

  .set-edit-btn {
    font-family: var(--mono);
    font-size: 0.625rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.125rem 0;
    border-bottom: 1px solid transparent;
  }

  .set-edit-btn:hover { color: var(--body); border-bottom-color: var(--border); }

  .set-del-btn {
    font-family: var(--mono);
    font-size: 0.625rem;
    color: #666;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.6;
  }

  .set-del-btn:hover { opacity: 1; color: #f43f5e; }

  /* ── Week selector (collapsed in Program view) ── */
  .week-row {
    display: flex;
    gap: 0.375rem;
    padding: 1rem;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .week-row::-webkit-scrollbar { display: none; }

  .week-btn {
    font-family: var(--mono);
    font-size: 0.75rem;
    min-width: 2.25rem;
    padding: 0.375rem 0;
    text-align: center;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--dim);
    cursor: pointer;
    flex-shrink: 0;
  }

  .week-btn.active {
    color: var(--heading);
    border-bottom-color: var(--lime);
  }

  /* ── Toggle hint ──────────────────────────────── */
  .hint {
    text-align: center;
    font-family: var(--mono);
    font-size: 0.625rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 2rem 1rem 1rem;
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<header>
  <span class="logo">PPL</span>
  <span class="week-label">WK <strong>09</strong> / 12</span>
  <nav>
    <a class="active">Log</a>
    <a>Program</a>
    <a>History</a>
  </nav>
</header>

<!-- ── Workout tabs ────────────────────────────────── -->
<div class="workout-tabs">
  <button class="workout-tab active">Push</button>
  <button class="workout-tab">Pull</button>
  <button class="workout-tab">Legs</button>
</div>

<!-- ── Week row ────────────────────────────────────── -->
<div class="week-row">
  <button class="week-btn">1</button>
  <button class="week-btn">2</button>
  <button class="week-btn">3</button>
  <button class="week-btn">4</button>
  <button class="week-btn">5</button>
  <button class="week-btn">6</button>
  <button class="week-btn">7</button>
  <button class="week-btn">8</button>
  <button class="week-btn active">9</button>
  <button class="week-btn">10</button>
  <button class="week-btn">11</button>
  <button class="week-btn">12</button>
</div>

<!-- ── Context bar ─────────────────────────────────── -->
<div class="context-bar">
  <span class="phase">Peaking block</span>
  <span class="rir-badge">0 RIR</span>
  <span class="desc">Max intensity</span>
</div>

<!-- ── Exercises ───────────────────────────────────── -->
<div class="exercises">

  <!-- Exercise 1: closed -->
  <div class="exercise">
    <button class="exercise-header" onclick="toggleEx(this)">
      <span class="ex-number">01</span>
      <div class="ex-info">
        <div class="ex-name">Bench Press</div>
        <div class="ex-meta">4 sets · 4–6 reps · RPE 9–10</div>
      </div>
      <span class="ex-progress">
        <span class="filled-char">█</span><span class="filled-char">█</span><span class="filled-char">█</span><span>░</span>
      </span>
    </button>
  </div>

  <!-- Exercise 2: open with sets -->
  <div class="exercise">
    <button class="exercise-header" onclick="toggleEx(this)">
      <span class="ex-number">02</span>
      <div class="ex-info">
        <div class="ex-name">Overhead Press</div>
        <div class="ex-meta">3–4 sets · 6–8 reps · RPE 8–9</div>
      </div>
      <span class="ex-progress">
        <span class="filled-char">█</span><span>░</span><span>░</span><span>░</span>
      </span>
    </button>

    <div class="sets">
      <p class="set-note">Load: top set from last week +2.5 kg · Rest 3–4 min</p>

      <!-- Saved set -->
      <div class="set-row is-saved">
        <span class="set-num">01</span>
        <span class="set-summary">65 kg × 6</span>
        <span class="set-rir">0 RIR</span>
        <div class="set-actions">
          <span style="font-family:var(--mono);font-size:0.7rem;color:var(--lime)">✓</span>
          <button class="set-edit-btn">Edit</button>
          <button class="set-del-btn">✕</button>
        </div>
      </div>

      <!-- Unsaved sets -->
      <div class="set-row">
        <span class="set-num">02</span>
        <input class="set-input" type="number" placeholder="kg" />
        <span class="set-sep">×</span>
        <input class="set-input" type="number" placeholder="reps" />
        <span class="set-rir">0 RIR</span>
        <button class="set-save">Save</button>
      </div>

      <div class="set-row">
        <span class="set-num">03</span>
        <input class="set-input" type="number" placeholder="kg" />
        <span class="set-sep">×</span>
        <input class="set-input" type="number" placeholder="reps" />
        <span class="set-rir">0 RIR</span>
        <button class="set-save">Save</button>
      </div>

      <div class="set-row">
        <span class="set-num">04</span>
        <input class="set-input" type="number" placeholder="kg" />
        <span class="set-sep">×</span>
        <input class="set-input" type="number" placeholder="reps" />
        <span class="set-rir">0 RIR</span>
        <button class="set-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Exercise 3: closed, complete -->
  <div class="exercise">
    <button class="exercise-header" onclick="toggleEx(this)">
      <span class="ex-number">03</span>
      <div class="ex-info">
        <div class="ex-name">Incline DB Press</div>
        <div class="ex-meta">3 sets · 8–10 reps · RPE 8</div>
      </div>
      <span class="ex-progress">
        <span class="filled-char">█</span><span class="filled-char">█</span><span class="filled-char">█</span>
      </span>
    </button>
  </div>

  <!-- Exercise 4: closed -->
  <div class="exercise">
    <button class="exercise-header" onclick="toggleEx(this)">
      <span class="ex-number">04</span>
      <div class="ex-info">
        <div class="ex-name">Cable Lateral Raise</div>
        <div class="ex-meta">3–4 sets · 12–15 reps · RPE 8–9</div>
      </div>
      <span class="ex-progress">
        <span>░</span><span>░</span><span>░</span><span>░</span>
      </span>
    </button>
  </div>

</div>

<p class="hint">Tap an exercise to expand · Design B mockup</p>

<script>
  function toggleEx(btn) {
    const card = btn.closest('.exercise');
    const sets = card.querySelector('.sets');
    if (sets) sets.remove();
    else {
      // just toggle visual — no real data here
    }
  }
</script>
</body>
</html>
