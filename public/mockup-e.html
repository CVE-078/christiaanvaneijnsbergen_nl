<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse — Design E Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

  /* Design E — "Focus": active exercise dominates the screen.
     Indigo accent, compact overview pips, oversized inputs. */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0d0f14;
    --surface:      #161820;
    --surface-2:    #1e2130;
    --border:       #252836;
    --muted:        #3a3d50;
    --dim:          #5a5e78;
    --body:         #b8bcd0;
    --heading:      #f0f1f8;
    --accent:       #6366f1;
    --accent-light: rgba(99,102,241,0.13);
    --green:        #22c55e;
    --green-light:  rgba(34,197,94,0.1);
    --mono:         'JetBrains Mono', monospace;
    --sans:         'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--body);
    font-family: var(--sans);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 72px;
  }

  /* ── Top bar ──────────────────────────────────────── */
  .topbar {
    padding: 1rem 1.25rem 0.875rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo {
    font-size: 0.9375rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--heading);
  }
  .logo em { color: var(--accent); font-style: normal; }

  .type-switcher {
    display: flex;
    gap: 0.25rem;
    margin-left: auto;
  }

  .type-btn {
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--dim);
    background: none;
    border: none;
    padding: 0.3rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
  }

  .type-btn.active {
    color: var(--accent);
    background: var(--accent-light);
  }

  .week-btn {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.3rem 0.625rem;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ── Exercise pip overview ────────────────────────── */
  .ex-strip {
    display: flex;
    gap: 0.375rem;
    padding: 0 1.25rem 1rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .ex-strip::-webkit-scrollbar { display: none; }

  .ex-pip {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.1s;
  }

  .ex-pip.active {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  .ex-pip.done {
    background: var(--green-light);
    border-color: rgba(34,197,94,0.3);
  }

  .pip-num {
    font-family: var(--mono);
    font-size: 0.5625rem;
    font-weight: 700;
    color: var(--dim);
    line-height: 1;
  }

  .ex-pip.active .pip-num { color: var(--accent); }
  .ex-pip.done .pip-num { color: var(--green); }

  .pip-dots { display: flex; gap: 2px; }

  .pip-dot {
    width: 4px;
    height: 4px;
    border-radius: 1px;
    background: var(--muted);
  }

  .pip-dot.filled { background: var(--accent); }
  .ex-pip.done .pip-dot.filled { background: var(--green); }

  /* ── Active exercise card ─────────────────────────── */
  .active-ex {
    margin: 0 1rem 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .active-ex-header {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .active-ex-context {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }

  .phase-tag {
    font-family: var(--mono);
    font-size: 0.5625rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .rir-tag {
    font-family: var(--mono);
    font-size: 0.625rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  .active-ex-name {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--heading);
    letter-spacing: -0.035em;
    line-height: 1.1;
  }

  .active-ex-meta {
    font-size: 0.75rem;
    color: var(--dim);
    margin-top: 0.4rem;
    line-height: 1.5;
  }

  /* ── Set rows ─────────────────────────────────────── */
  .sets { padding: 0.25rem 0; }

  .set-row {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.625rem 1.25rem;
    border-bottom: 1px solid var(--border);
    min-height: 56px;
  }
  .set-row:last-child { border-bottom: none; }
  .set-row.saved { background: rgba(99,102,241,0.04); }

  .set-num {
    font-family: var(--mono);
    font-size: 0.625rem;
    color: var(--muted);
    width: 1rem;
    flex-shrink: 0;
  }

  .set-input {
    flex: 1;
    height: 44px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--heading);
    font-family: var(--mono);
    font-size: 1.125rem;
    font-weight: 700;
    text-align: center;
    outline: none;
    letter-spacing: -0.02em;
    transition: border-color 0.15s, background 0.15s;
    -moz-appearance: textfield;
  }

  .set-input:focus {
    border-color: var(--accent);
    background: #1c1f2e;
  }

  .set-input::placeholder {
    color: var(--muted);
    font-weight: 400;
    font-size: 0.875rem;
    letter-spacing: 0;
  }

  .set-sep {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 1rem;
    flex-shrink: 0;
  }

  .set-rir-lbl {
    font-family: var(--mono);
    font-size: 0.5625rem;
    letter-spacing: 0.06em;
    color: var(--dim);
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .set-save {
    height: 44px;
    min-width: 56px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    transition: opacity 0.1s;
  }
  .set-save:hover { opacity: 0.85; }

  /* Saved */
  .set-saved-summary {
    flex: 1;
    display: flex;
    align-items: baseline;
    gap: 0.375rem;
  }

  .saved-weight {
    font-family: var(--mono);
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--heading);
    letter-spacing: -0.03em;
  }

  .saved-unit { font-family: var(--mono); font-size: 0.625rem; color: var(--dim); }

  .saved-reps {
    font-family: var(--mono);
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--body);
  }

  .saved-rir {
    font-family: var(--mono);
    font-size: 0.5625rem;
    color: var(--dim);
    margin-left: auto;
    padding-right: 0.25rem;
  }

  .saved-check { color: var(--accent); font-size: 0.875rem; flex-shrink: 0; }

  /* ── Rest strip ───────────────────────────────────── */
  .rest-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
  }

  .rest-lbl {
    font-family: var(--mono);
    font-size: 0.5625rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .rest-track {
    flex: 1;
    height: 3px;
    background: var(--muted);
    border-radius: 2px;
    overflow: hidden;
  }

  .rest-fill {
    height: 100%;
    width: 58%;
    background: var(--accent);
    border-radius: 2px;
  }

  .rest-time {
    font-family: var(--mono);
    font-size: 0.8125rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── Collapsed exercise rows ──────────────────────── */
  .collapsed-ex {
    margin: 0.25rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.1s, border-color 0.1s;
  }

  .collapsed-ex:hover { opacity: 1; border-color: var(--accent); }

  .collapsed-ex.done {
    opacity: 0.7;
    border-color: rgba(34,197,94,0.25);
  }

  .col-num {
    font-family: var(--mono);
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--muted);
    width: 1.5rem;
    flex-shrink: 0;
  }

  .collapsed-ex.done .col-num { color: rgba(34,197,94,0.5); }

  .col-name {
    flex: 1;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--body);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .col-progress {
    font-family: var(--mono);
    font-size: 0.6875rem;
    color: var(--dim);
    flex-shrink: 0;
  }

  .collapsed-ex.done .col-progress { color: var(--green); }

  /* ── Bottom nav ───────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    height: 60px;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.2rem;
    background: none;
    border: none;
    cursor: pointer;
  }

  .nav-icon { font-size: 1rem; color: var(--dim); }
  .nav-item.active .nav-icon { color: var(--accent); }

  .nav-lbl {
    font-size: 0.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .nav-item.active .nav-lbl { color: var(--accent); }
</style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────── -->
<div class="topbar">
  <span class="logo">Pulse<em>.</em></span>
  <div class="type-switcher">
    <button class="type-btn active">Push</button>
    <button class="type-btn">Pull</button>
    <button class="type-btn">Legs</button>
  </div>
  <button class="week-btn">WK 09</button>
</div>

<!-- ── Exercise pips ──────────────────────────────── -->
<div class="ex-strip">
  <div class="ex-pip done">
    <span class="pip-num">01</span>
    <div class="pip-dots">
      <div class="pip-dot filled"></div>
      <div class="pip-dot filled"></div>
      <div class="pip-dot filled"></div>
      <div class="pip-dot filled"></div>
    </div>
  </div>
  <div class="ex-pip active">
    <span class="pip-num">02</span>
    <div class="pip-dots">
      <div class="pip-dot filled"></div>
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
    </div>
  </div>
  <div class="ex-pip">
    <span class="pip-num">03</span>
    <div class="pip-dots">
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
    </div>
  </div>
  <div class="ex-pip">
    <span class="pip-num">04</span>
    <div class="pip-dots">
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
    </div>
  </div>
  <div class="ex-pip">
    <span class="pip-num">05</span>
    <div class="pip-dots">
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
      <div class="pip-dot"></div>
    </div>
  </div>
</div>

<!-- ── Active exercise ─────────────────────────────── -->
<div class="active-ex">
  <div class="active-ex-header">
    <div class="active-ex-context">
      <span class="phase-tag">Peaking block</span>
      <span class="rir-tag">RIR 0</span>
    </div>
    <div class="active-ex-name">Overhead Press</div>
    <div class="active-ex-meta">3–4 sets · 6–8 reps &nbsp;·&nbsp; Last week: 62.5 kg &times; 7 &nbsp;→&nbsp; aim 65 kg</div>
  </div>

  <div class="sets">
    <div class="set-row saved">
      <span class="set-num">1</span>
      <div class="set-saved-summary">
        <span class="saved-weight">65</span>
        <span class="saved-unit">kg</span>
        <span class="saved-reps">&times; 6</span>
        <span class="saved-rir">RIR 0</span>
      </div>
      <span class="saved-check">✓</span>
    </div>

    <div class="set-row">
      <span class="set-num">2</span>
      <input class="set-input" type="number" placeholder="kg" value="65" />
      <span class="set-sep">×</span>
      <input class="set-input" type="number" placeholder="reps" />
      <span class="set-rir-lbl">RIR&nbsp;0</span>
      <button class="set-save">Save</button>
    </div>

    <div class="set-row">
      <span class="set-num">3</span>
      <input class="set-input" type="number" placeholder="kg" />
      <span class="set-sep">×</span>
      <input class="set-input" type="number" placeholder="reps" />
      <span class="set-rir-lbl">RIR&nbsp;0</span>
      <button class="set-save">Save</button>
    </div>

    <div class="set-row">
      <span class="set-num">4</span>
      <input class="set-input" type="number" placeholder="kg" />
      <span class="set-sep">×</span>
      <input class="set-input" type="number" placeholder="reps" />
      <span class="set-rir-lbl">RIR&nbsp;0</span>
      <button class="set-save">Save</button>
    </div>
  </div>

  <div class="rest-row">
    <span class="rest-lbl">Rest</span>
    <div class="rest-track"><div class="rest-fill"></div></div>
    <span class="rest-time">1:32</span>
  </div>
</div>

<!-- ── Other exercises (collapsed) ────────────────── -->
<div class="collapsed-ex done">
  <span class="col-num">01</span>
  <span class="col-name">Bench Press</span>
  <span class="col-progress">4/4 ✓</span>
</div>

<div class="collapsed-ex">
  <span class="col-num">03</span>
  <span class="col-name">Incline DB Press</span>
  <span class="col-progress">0/3</span>
</div>

<div class="collapsed-ex">
  <span class="col-num">04</span>
  <span class="col-name">Cable Lateral Raise</span>
  <span class="col-progress">0/4</span>
</div>

<div class="collapsed-ex">
  <span class="col-num">05</span>
  <span class="col-name">Tricep Pushdown</span>
  <span class="col-progress">0/3</span>
</div>

<!-- ── Bottom nav ──────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">⊞</span>
    <span class="nav-lbl">Log</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">◈</span>
    <span class="nav-lbl">Program</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">◷</span>
    <span class="nav-lbl">History</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">◉</span>
    <span class="nav-lbl">Profile</span>
  </button>
</nav>

</body>
</html>
