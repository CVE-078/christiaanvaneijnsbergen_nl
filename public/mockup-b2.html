<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse — Design B Accent Colours</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Swatch picker ─────────────────────────────── */
  .picker {
    display: flex;
    gap: 0.75rem;
    padding: 1.25rem 1rem 1rem;
    border-bottom: 1px solid #1f1f1f;
    flex-wrap: wrap;
  }

  .swatch {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.375rem 0.75rem 0.375rem 0.5rem;
    border-radius: 100px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.12s;
  }

  .swatch.active { border-color: #fff; }

  .swatch-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .swatch-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.625rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #aaa;
  }

  /* ── Tracker shell ─────────────────────────────── */
  .tracker {
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #0a0a0a;
    border-bottom: 1px solid #1f1f1f;
    padding: 0 1rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.8125rem;
    letter-spacing: 0.08em;
    color: #fff;
    text-transform: uppercase;
  }

  .logo-dot { color: var(--accent); }

  .week-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.05em;
  }

  .week-label strong { color: var(--accent); font-weight: 700; }

  nav {
    margin-left: auto;
    display: flex;
    gap: 1.25rem;
  }

  nav a {
    font-size: 0.8125rem;
    font-weight: 500;
    color: #555;
    text-decoration: none;
    cursor: pointer;
  }

  nav a.active { color: #fff; border-bottom: 1px solid var(--accent); padding-bottom: 1px; }

  /* ── Workout tabs ──────────────────────────────── */
  .workout-tabs {
    display: flex;
    border-bottom: 1px solid #1f1f1f;
  }

  .workout-tab {
    flex: 1;
    padding: 0.875rem 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6875rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .workout-tab.active { color: #fff; border-bottom-color: var(--accent); }

  /* ── Week row ──────────────────────────────────── */
  .week-row {
    display: flex;
    padding: 0 1rem;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid #1f1f1f;
  }

  .week-row::-webkit-scrollbar { display: none; }

  .week-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    min-width: 2.25rem;
    padding: 0.625rem 0;
    text-align: center;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #555;
    cursor: pointer;
    flex-shrink: 0;
    margin-bottom: -1px;
  }

  .week-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* ── Context bar ───────────────────────────────── */
  .context-bar {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 1rem 1rem 0.5rem;
  }

  .phase { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
  .rir-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
  .desc { font-size: 0.8125rem; color: #555; margin-left: auto; }

  /* ── Exercises ─────────────────────────────────── */
  .exercises { padding: 0.5rem 1rem 2rem; display: flex; flex-direction: column; gap: 0.25rem; }

  .exercise {
    background: #141414;
    border: 1px solid #1f1f1f;
    border-radius: 4px;
    overflow: hidden;
  }

  .exercise-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.875rem 1rem;
    cursor: pointer;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
  }

  .ex-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.75rem;
    font-weight: 700;
    color: #2a2a2a;
    line-height: 1;
    width: 2.25rem;
    flex-shrink: 0;
    letter-spacing: -0.04em;
    user-select: none;
  }

  .ex-info { flex: 1; min-width: 0; }

  .ex-name { font-weight: 600; font-size: 0.9375rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .ex-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; letter-spacing: 0.06em; color: #555; margin-top: 0.25rem; text-transform: uppercase; }

  .ex-progress { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; letter-spacing: 0.05em; flex-shrink: 0; color: #3a3a3a; }

  .ex-progress .f { color: var(--accent); }

  /* ── Sets ──────────────────────────────────────── */
  .sets { border-top: 1px solid #1f1f1f; padding: 0.25rem 1rem 0.875rem; }

  .set-note { font-size: 0.75rem; color: #555; padding: 0.625rem 0 0.375rem; line-height: 1.5; }

  .set-row { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0; border-bottom: 1px solid #1a1a1a; }
  .set-row:last-child { border-bottom: none; }

  .set-num { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; color: #3a3a3a; width: 1.5rem; flex-shrink: 0; }

  .set-input {
    width: 3.75rem;
    padding: 0.4rem 0.5rem;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 3px;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8125rem;
    text-align: center;
    outline: none;
    transition: border-color 0.1s;
  }

  .set-input:focus { border-color: var(--accent); }
  .set-input::placeholder { color: #333; }

  .set-sep { font-family: 'JetBrains Mono', monospace; color: #3a3a3a; font-size: 0.75rem; }

  .set-rir { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; color: #555; margin-left: auto; }

  .set-save {
    padding: 0.375rem 0.875rem;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    color: #aaa;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6875rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.1s, color 0.1s;
  }

  .set-save:hover { border-color: var(--accent); color: var(--accent); }

  /* Saved */
  .set-row.is-saved { opacity: 0.55; }

  .set-summary { font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem; color: #d4d4d4; }

  .set-actions { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }

  .set-check { font-size: 0.75rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  .set-edit-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; letter-spacing: 0.06em; text-transform: uppercase; color: #555; background: none; border: none; cursor: pointer; }
  .set-edit-btn:hover { color: #aaa; }

  .set-del-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; color: #444; background: none; border: none; cursor: pointer; }
  .set-del-btn:hover { color: #f43f5e; }

  .hint {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.625rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #333;
    padding: 2rem 1rem 1.5rem;
  }
</style>
</head>
<body>

<!-- ── Colour picker ─────────────────────────────── -->
<div class="picker" id="picker">
  <div class="swatch active" data-color="#ff6c2f" onclick="setAccent(this)">
    <div class="swatch-dot" style="background:#ff6c2f"></div>
    <span class="swatch-label">Orange ★</span>
  </div>
  <div class="swatch" data-color="#f59e0b" onclick="setAccent(this)">
    <div class="swatch-dot" style="background:#f59e0b"></div>
    <span class="swatch-label">Amber</span>
  </div>
  <div class="swatch" data-color="#3d8bff" onclick="setAccent(this)">
    <div class="swatch-dot" style="background:#3d8bff"></div>
    <span class="swatch-label">Blue</span>
  </div>
  <div class="swatch" data-color="#00d4b4" onclick="setAccent(this)">
    <div class="swatch-dot" style="background:#00d4b4"></div>
    <span class="swatch-label">Teal</span>
  </div>
  <div class="swatch" data-color="#e8ff47" onclick="setAccent(this)">
    <div class="swatch-dot" style="background:#e8ff47"></div>
    <span class="swatch-label">Lime</span>
  </div>
</div>

<!-- ── Tracker preview ───────────────────────────── -->
<div class="tracker" id="tracker" style="--accent: #ff6c2f">

  <header>
    <span class="logo">Pulse<span class="logo-dot">.</span></span>
    <span class="week-label">WK <strong>09</strong> / 12</span>
    <nav>
      <a class="active">Log</a>
      <a>Program</a>
      <a>History</a>
    </nav>
  </header>

  <div class="workout-tabs">
    <button class="workout-tab active">Push</button>
    <button class="workout-tab">Pull</button>
    <button class="workout-tab">Legs</button>
  </div>

  <div class="week-row">
    <button class="week-btn">1</button>
    <button class="week-btn">2</button>
    <button class="week-btn">3</button>
    <button class="week-btn">4</button>
    <button class="week-btn">5</button>
    <button class="week-btn">6</button>
    <button class="week-btn">7</button>
    <button class="week-btn">8</button>
    <button class="week-btn active">9</button>
    <button class="week-btn">10</button>
    <button class="week-btn">11</button>
    <button class="week-btn">12</button>
  </div>

  <div class="context-bar">
    <span class="phase">Peaking block</span>
    <span class="rir-badge">0 RIR</span>
    <span class="desc">Max intensity</span>
  </div>

  <div class="exercises">

    <div class="exercise">
      <button class="exercise-header">
        <span class="ex-number">01</span>
        <div class="ex-info">
          <div class="ex-name">Bench Press</div>
          <div class="ex-meta">4 sets · 4–6 reps · RPE 9–10</div>
        </div>
        <span class="ex-progress"><span class="f">█</span><span class="f">█</span><span class="f">█</span><span>░</span></span>
      </button>
    </div>

    <div class="exercise">
      <button class="exercise-header">
        <span class="ex-number">02</span>
        <div class="ex-info">
          <div class="ex-name">Overhead Press</div>
          <div class="ex-meta">3–4 sets · 6–8 reps · RPE 8–9</div>
        </div>
        <span class="ex-progress"><span class="f">█</span><span>░</span><span>░</span><span>░</span></span>
      </button>

      <div class="sets">
        <p class="set-note">Top set from last week +2.5 kg &mdash; rest 3–4 min</p>

        <div class="set-row is-saved">
          <span class="set-num">01</span>
          <span class="set-summary">65 kg × 6</span>
          <span class="set-rir" style="margin-left:0.5rem">0 RIR</span>
          <div class="set-actions">
            <span class="set-check">✓</span>
            <button class="set-edit-btn">Edit</button>
            <button class="set-del-btn">✕</button>
          </div>
        </div>

        <div class="set-row">
          <span class="set-num">02</span>
          <input class="set-input" type="number" placeholder="kg" />
          <span class="set-sep">×</span>
          <input class="set-input" type="number" placeholder="reps" />
          <span class="set-rir">0 RIR</span>
          <button class="set-save">Save</button>
        </div>

        <div class="set-row">
          <span class="set-num">03</span>
          <input class="set-input" type="number" placeholder="kg" />
          <span class="set-sep">×</span>
          <input class="set-input" type="number" placeholder="reps" />
          <span class="set-rir">0 RIR</span>
          <button class="set-save">Save</button>
        </div>

        <div class="set-row">
          <span class="set-num">04</span>
          <input class="set-input" type="number" placeholder="kg" />
          <span class="set-sep">×</span>
          <input class="set-input" type="number" placeholder="reps" />
          <span class="set-rir">0 RIR</span>
          <button class="set-save">Save</button>
        </div>
      </div>
    </div>

    <div class="exercise">
      <button class="exercise-header">
        <span class="ex-number">03</span>
        <div class="ex-info">
          <div class="ex-name">Incline DB Press</div>
          <div class="ex-meta">3 sets · 8–10 reps · RPE 8</div>
        </div>
        <span class="ex-progress"><span class="f">█</span><span class="f">█</span><span class="f">█</span></span>
      </button>
    </div>

    <div class="exercise">
      <button class="exercise-header">
        <span class="ex-number">04</span>
        <div class="ex-info">
          <div class="ex-name">Cable Lateral Raise</div>
          <div class="ex-meta">3–4 sets · 12–15 reps · RPE 8–9</div>
        </div>
        <span class="ex-progress"><span>░</span><span>░</span><span>░</span><span>░</span></span>
      </button>
    </div>

  </div>

  <p class="hint">christiaanvaneijnsbergen.nl/pulse &nbsp;·&nbsp; click swatches above to compare</p>

</div>

<script>
  function setAccent(el) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tracker').style.setProperty('--accent', el.dataset.color);
  }
</script>

</body>
</html>
