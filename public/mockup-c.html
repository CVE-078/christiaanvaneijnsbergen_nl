<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse — Design C Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a0a0a;
    --surface:     #141414;
    --surface-2:   #1a1a1a;
    --border:      #222;
    --muted:       #3a3a3a;
    --dim:         #555;
    --body:        #ccc;
    --heading:     #fff;
    --accent:      #ff6c2f;
    --green:       #22c55e;
    --mono:        'JetBrains Mono', monospace;
    --sans:        'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--body);
    font-family: var(--sans);
    font-size: 0.875rem;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 72px;
  }

  /* ── Top bar ──────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: 0.75rem;
  }

  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.8125rem;
    letter-spacing: 0.1em;
    color: var(--heading);
    text-transform: uppercase;
  }
  .logo em { color: var(--accent); font-style: normal; }

  .week-pill {
    font-family: var(--mono);
    font-size: 0.6875rem;
    font-weight: 700;
    color: var(--accent);
    background: rgba(255,108,47,0.1);
    border: 1px solid rgba(255,108,47,0.2);
    padding: 0.25rem 0.625rem;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }

  .streak {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 0.625rem;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  /* ── Workout tabs ─────────────────────────────────── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.625rem 0 0.5rem;
    gap: 0.2rem;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.1s;
    margin-bottom: -1px;
  }

  .tab-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: 0.01em;
  }

  .tab.active .tab-label { color: var(--heading); }
  .tab.active { border-bottom-color: var(--accent); }

  .tab-meta {
    font-family: var(--mono);
    font-size: 0.5625rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .tab.active .tab-meta { color: var(--dim); }

  /* ── Week strip ──────────────────────────────────── */
  .week-strip {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 0.75rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .week-strip::-webkit-scrollbar { display: none; }

  .wk {
    flex-shrink: 0;
    min-width: 2.25rem;
    padding: 0.5rem 0 0.375rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    margin-bottom: -1px;
  }

  .wk.active { color: var(--accent); font-weight: 700; border-bottom-color: var(--accent); }

  .wk .dot {
    display: block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    margin: 2px auto 0;
    background: transparent;
  }
  .wk.has-data .dot { background: var(--dim); }
  .wk.active.has-data .dot { background: var(--accent); }

  /* ── Phase bar ───────────────────────────────────── */
  .phase-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .phase-name {
    font-family: var(--mono);
    font-size: 0.5625rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .rir-badge {
    font-family: var(--mono);
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent);
    background: rgba(255,108,47,0.08);
    border: 1px solid rgba(255,108,47,0.15);
    padding: 0.125rem 0.4rem;
    border-radius: 3px;
  }

  .phase-desc {
    margin-left: auto;
    font-size: 0.6875rem;
    color: var(--dim);
  }

  /* ── Exercises ───────────────────────────────────── */
  .exercises {
    display: flex;
    flex-direction: column;
    padding: 0.5rem 0 1rem;
  }

  .exercise {
    margin: 0.25rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .ex-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1rem;
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
  }

  .ex-num {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    width: 1.75rem;
    flex-shrink: 0;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .ex-body { flex: 1; min-width: 0; }

  .ex-name {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--heading);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ex-info {
    font-size: 0.6875rem;
    color: var(--dim);
    margin-top: 0.2rem;
  }

  .ex-progress {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.3rem;
  }

  .ex-fraction {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--dim);
  }
  .ex-fraction .done { color: var(--heading); }

  .ex-dots { display: flex; gap: 3px; }

  .dot-fill {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .dot-fill.done { background: var(--accent); }
  .dot-fill.all-done { background: var(--green); }

  /* Thin progress bar shown under header when open */
  .ex-progress-bar {
    height: 2px;
    background: var(--muted);
    overflow: hidden;
  }
  .ex-progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
  }

  /* ── Sets ─────────────────────────────────────────── */
  .sets {
    border-top: 1px solid var(--border);
    padding: 0.25rem 0;
  }

  .set-note {
    font-size: 0.6875rem;
    color: var(--dim);
    padding: 0.625rem 1rem;
    line-height: 1.6;
    font-style: italic;
    border-bottom: 1px solid var(--border);
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1rem;
    border-bottom: 1px solid var(--border);
    min-height: 52px;
  }
  .set-row:last-child { border-bottom: none; }

  .set-num {
    font-family: var(--mono);
    font-size: 0.625rem;
    color: var(--muted);
    width: 1rem;
    flex-shrink: 0;
  }

  .set-inputs {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    flex: 1;
  }

  .set-input {
    flex: 1;
    height: 40px;
    padding: 0 0.625rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--heading);
    font-family: var(--mono);
    font-size: 0.9375rem;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .set-input:focus {
    border-color: rgba(255,108,47,0.5);
    background: #1e1a17;
  }

  .set-input::placeholder {
    color: var(--muted);
    font-weight: 400;
    font-size: 0.8125rem;
  }

  .set-sep {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.8125rem;
    flex-shrink: 0;
  }

  .rir-label {
    font-family: var(--mono);
    font-size: 0.5625rem;
    letter-spacing: 0.06em;
    color: var(--dim);
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .set-save-btn {
    height: 40px;
    padding: 0 1rem;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    transition: opacity 0.1s;
  }
  .set-save-btn:hover { opacity: 0.85; }

  /* Saved row */
  .set-row.saved { background: #0e1510; }

  .set-saved-data {
    flex: 1;
    display: flex;
    align-items: baseline;
    gap: 0.375rem;
  }

  .set-weight {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 700;
    color: var(--heading);
    letter-spacing: -0.02em;
  }

  .set-unit { font-family: var(--mono); font-size: 0.625rem; color: var(--dim); }

  .set-reps {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--body);
  }

  .set-rir-saved { font-family: var(--mono); font-size: 0.5625rem; color: var(--dim); }

  .set-check-icon { color: var(--green); font-size: 0.75rem; flex-shrink: 0; margin-left: auto; }

  /* ── Rest timer ───────────────────────────────────── */
  .rest-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 1rem;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    margin: -0.25rem 0.75rem 0.25rem;
    border-radius: 0 0 8px 8px;
  }

  .rest-label {
    font-family: var(--mono);
    font-size: 0.5625rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .rest-track {
    flex: 1;
    height: 3px;
    background: var(--muted);
    border-radius: 2px;
    overflow: hidden;
  }

  .rest-fill {
    width: 60%;
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }

  .rest-time {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  /* ── Complete exercise style ──────────────────────── */
  .exercise.complete { border-color: rgba(34,197,94,0.2); }
  .exercise.complete .ex-num { color: rgba(34,197,94,0.4); }

  /* ── Bottom nav ───────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    height: 64px;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem 0;
  }

  .nav-icon { font-size: 1rem; line-height: 1; color: var(--dim); }
  .nav-item.active .nav-icon { color: var(--accent); }

  .nav-label {
    font-size: 0.5625rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .nav-item.active .nav-label { color: var(--accent); }
</style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────── -->
<div class="topbar">
  <span class="logo">PULSE<em>.</em></span>
  <span class="week-pill">WK 09</span>
  <span class="streak">4wk streak</span>
</div>

<!-- ── Workout tabs ────────────────────────────────── -->
<div class="tabs">
  <button class="tab active">
    <span class="tab-label">Push</span>
    <span class="tab-meta">3 / 5 done</span>
  </button>
  <button class="tab">
    <span class="tab-label">Pull</span>
    <span class="tab-meta">0 / 5 done</span>
  </button>
  <button class="tab">
    <span class="tab-label">Legs</span>
    <span class="tab-meta">0 / 5 done</span>
  </button>
</div>

<!-- ── Week strip ──────────────────────────────────── -->
<div class="week-strip">
  <button class="wk has-data">1<span class="dot"></span></button>
  <button class="wk has-data">2<span class="dot"></span></button>
  <button class="wk has-data">3<span class="dot"></span></button>
  <button class="wk has-data">4<span class="dot"></span></button>
  <button class="wk has-data">5<span class="dot"></span></button>
  <button class="wk has-data">6<span class="dot"></span></button>
  <button class="wk has-data">7<span class="dot"></span></button>
  <button class="wk has-data">8<span class="dot"></span></button>
  <button class="wk active has-data">9<span class="dot"></span></button>
  <button class="wk">10<span class="dot"></span></button>
  <button class="wk">11<span class="dot"></span></button>
  <button class="wk">12<span class="dot"></span></button>
</div>

<!-- ── Phase bar ───────────────────────────────────── -->
<div class="phase-bar">
  <span class="phase-name">Peaking block</span>
  <span class="rir-badge">RIR 0</span>
  <span class="phase-desc">Max intensity</span>
</div>

<!-- ── Exercises ───────────────────────────────────── -->
<div class="exercises">

  <!-- 1: Complete -->
  <div class="exercise complete">
    <button class="ex-header">
      <span class="ex-num">01</span>
      <div class="ex-body">
        <div class="ex-name">Bench Press</div>
        <div class="ex-info">4 sets · 4–6 reps</div>
      </div>
      <div class="ex-progress">
        <span class="ex-fraction"><span class="done">4</span>/4</span>
        <div class="ex-dots">
          <div class="dot-fill all-done"></div>
          <div class="dot-fill all-done"></div>
          <div class="dot-fill all-done"></div>
          <div class="dot-fill all-done"></div>
        </div>
      </div>
    </button>
  </div>

  <!-- 2: Partial, open -->
  <div class="exercise">
    <button class="ex-header">
      <span class="ex-num">02</span>
      <div class="ex-body">
        <div class="ex-name">Overhead Press</div>
        <div class="ex-info">3–4 sets · 6–8 reps</div>
      </div>
      <div class="ex-progress">
        <span class="ex-fraction"><span class="done">1</span>/4</span>
        <div class="ex-dots">
          <div class="dot-fill done"></div>
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
        </div>
      </div>
    </button>
    <div class="ex-progress-bar"><div class="ex-progress-bar-fill" style="width: 25%"></div></div>

    <div class="sets">
      <p class="set-note">Last week: 62.5 kg &times; 7 &nbsp;→&nbsp; try 65 kg today</p>

      <div class="set-row saved">
        <span class="set-num">1</span>
        <div class="set-saved-data">
          <span class="set-weight">65</span>
          <span class="set-unit">kg</span>
          <span class="set-reps">&times; 6</span>
          <span class="set-rir-saved">RIR 0</span>
        </div>
        <span class="set-check-icon">✓</span>
      </div>

      <div class="set-row">
        <span class="set-num">2</span>
        <div class="set-inputs">
          <input class="set-input" type="number" placeholder="kg" value="65" />
          <span class="set-sep">×</span>
          <input class="set-input" type="number" placeholder="reps" />
        </div>
        <span class="rir-label">RIR&nbsp;0</span>
        <button class="set-save-btn">Save</button>
      </div>

      <div class="set-row">
        <span class="set-num">3</span>
        <div class="set-inputs">
          <input class="set-input" type="number" placeholder="kg" />
          <span class="set-sep">×</span>
          <input class="set-input" type="number" placeholder="reps" />
        </div>
        <span class="rir-label">RIR&nbsp;0</span>
        <button class="set-save-btn">Save</button>
      </div>

      <div class="set-row">
        <span class="set-num">4</span>
        <div class="set-inputs">
          <input class="set-input" type="number" placeholder="kg" />
          <span class="set-sep">×</span>
          <input class="set-input" type="number" placeholder="reps" />
        </div>
        <span class="rir-label">RIR&nbsp;0</span>
        <button class="set-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Rest timer pinned beneath open exercise -->
  <div class="rest-bar">
    <span class="rest-label">Rest</span>
    <div class="rest-track"><div class="rest-fill"></div></div>
    <span class="rest-time">1:32</span>
  </div>

  <!-- 3: Untouched -->
  <div class="exercise">
    <button class="ex-header">
      <span class="ex-num">03</span>
      <div class="ex-body">
        <div class="ex-name">Incline DB Press</div>
        <div class="ex-info">3 sets · 8–10 reps</div>
      </div>
      <div class="ex-progress">
        <span class="ex-fraction"><span class="done">0</span>/3</span>
        <div class="ex-dots">
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
        </div>
      </div>
    </button>
  </div>

  <!-- 4: Untouched -->
  <div class="exercise">
    <button class="ex-header">
      <span class="ex-num">04</span>
      <div class="ex-body">
        <div class="ex-name">Cable Lateral Raise</div>
        <div class="ex-info">3–4 sets · 12–15 reps</div>
      </div>
      <div class="ex-progress">
        <span class="ex-fraction"><span class="done">0</span>/4</span>
        <div class="ex-dots">
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
          <div class="dot-fill"></div>
        </div>
      </div>
    </button>
  </div>

</div>

<!-- ── Bottom nav ──────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">⊞</span>
    <span class="nav-label">Log</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">◈</span>
    <span class="nav-label">Program</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">◷</span>
    <span class="nav-label">History</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">◉</span>
    <span class="nav-label">Profile</span>
  </button>
</nav>

</body>
</html>
